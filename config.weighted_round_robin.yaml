# Load Balancer Configuration - Weighted Round Robin Example
# Use this when backends have different capacities or resources.
# Backends with higher weights receive more traffic.

port: 8080
algorithm: weighted_round_robin

request_timeout: 30s
idle_timeout: 90s
max_idle_conns: 100

# Backends with weights
# A weight of 2 means 2x traffic compared to weight 1
backends:
  - id: powerful-backend
    host: powerful.example.com
    port: 8080
    weight: 3          # Gets 3 units of traffic
    max_conns: 500

  - id: normal-backend-1
    host: normal-1.example.com
    port: 8080
    weight: 1          # Gets 1 unit of traffic
    max_conns: 200

  - id: normal-backend-2
    host: normal-2.example.com
    port: 8080
    weight: 1          # Gets 1 unit of traffic
    max_conns: 200

  - id: dev-backend
    host: dev.example.com
    port: 8080
    weight: 0          # Disabled (0 weight = no traffic)
    max_conns: 100

# Health checking
health_check:
  enabled: true
  interval: 10s
  timeout: 5s
  unhealthy_threshold: 3
  healthy_threshold: 2
  path: /health
  method: GET
  expected_status: 200

# Sticky sessions for API clients
sticky_session:
  enabled: true
  method: cookie
  cookie_name: LB_SESSION
  ttl: 24h
