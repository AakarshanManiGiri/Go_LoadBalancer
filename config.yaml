# Load Balancer Configuration

# Port to listen on
port: 8080

# Routing algorithm: "round_robin", "weighted_round_robin", or "least_connections"
algorithm: round_robin

# Request and connection timeouts
request_timeout: 30s
idle_timeout: 90s
max_idle_conns: 100

# Backend servers
backends:
  - id: backend-1
    host: localhost
    port: 8081
    weight: 1
    max_conns: 100

  - id: backend-2
    host: localhost
    port: 8082
    weight: 1
    max_conns: 100

  - id: backend-3
    host: localhost
    port: 8083
    weight: 1
    max_conns: 100

# Health check configuration
health_check:
  enabled: true
  interval: 10s
  timeout: 5s
  unhealthy_threshold: 3
  healthy_threshold: 2
  path: /health
  method: GET
  expected_status: 200

# Sticky session configuration
sticky_session:
  enabled: true
  method: cookie  # "cookie" or "ip_hash"
  cookie_name: LB_SESSION
  ttl: 24h
